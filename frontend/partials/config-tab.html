<div class="space-y-6">
    <div class="card">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Configuration</h2>
        
        <template x-if="config">
            <form @submit.prevent="saveConfig" class="space-y-6">
                <!-- Media Settings -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-4">Media Settings</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="label">Days Unwatched</label>
                            <input type="number" x-model.number="config.media.days_unwatched" class="input-field">
                            <p class="text-xs text-gray-500 mt-1">Number of days since last watched</p>
                        </div>
                        <div>
                            <label class="label">Min Days Since Added</label>
                            <input type="number" x-model.number="config.media.min_days_since_added" class="input-field">
                            <p class="text-xs text-gray-500 mt-1">Minimum days since added to library</p>
                        </div>
                        <div class="md:col-span-2">
                            <label class="flex items-center">
                                <input type="checkbox" x-model="config.media.require_zero_play_count" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                                <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Only remove items that have never been watched</span>
                            </label>
                        </div>
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" x-model="config.media.process_movies" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                                <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Process Movies</span>
                            </label>
                        </div>
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" x-model="config.media.process_tv_shows" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                                <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Process TV Shows</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Advanced Filters (Collapsible) -->
                <div x-data="{ filtersOpen: false }" class="border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden">
                    <button type="button" @click="filtersOpen = !filtersOpen" 
                            class="flex items-center justify-between w-full text-left px-6 py-4 bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <div class="flex items-center space-x-3">
                            <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                            </svg>
                            <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-200">Advanced Filters</h3>
                            <span class="text-xs text-gray-500 dark:text-gray-400">(Click to expand)</span>
                        </div>
                        <svg class="w-6 h-6 text-gray-500 transition-transform duration-200" :class="filtersOpen ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    
                    <div x-show="filtersOpen" x-transition class="p-6 space-y-4 bg-white dark:bg-gray-900">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="label">Min Rating to Keep (0-10)</label>
                                <input type="number" step="0.1" min="0" max="10" x-model.number="config.media.filters.min_rating_to_keep" class="input-field">
                                <p class="text-xs text-gray-500 mt-1">Keep items rated above this (0 = disabled)</p>
                            </div>
                            <div>
                                <label class="label">Min Audience Rating to Keep (0-10)</label>
                                <input type="number" step="0.1" min="0" max="10" x-model.number="config.media.filters.min_audience_rating_to_keep" class="input-field">
                                <p class="text-xs text-gray-500 mt-1">Keep items with audience rating above this (0 = disabled)</p>
                            </div>
                            <div>
                                <label class="label">Protect Classics Before Year</label>
                                <input type="number" x-model.number="config.media.filters.protect_classics_before_year" class="input-field">
                                <p class="text-xs text-gray-500 mt-1">Keep movies from this year or earlier (0 = disabled)</p>
                            </div>
                            <div>
                                <label class="label">Protect Recent After Year</label>
                                <input type="number" x-model.number="config.media.filters.protect_recent_after_year" class="input-field">
                                <p class="text-xs text-gray-500 mt-1">Keep movies newer than this year (0 = disabled)</p>
                            </div>
                            <div>
                                <label class="label">Min File Size to Keep (bytes)</label>
                                <input type="number" x-model.number="config.media.filters.min_file_size_to_keep" class="input-field">
                                <p class="text-xs text-gray-500 mt-1">Keep files larger than this (0 = disabled, 5GB = 5368709120)</p>
                            </div>
                        </div>
                        
                        <div>
                            <label class="label">Protected Keywords (one per line)</label>
                            <textarea x-model="protectedKeywordsText" @input="updateProtectedKeywords" rows="6" class="input-field font-mono text-sm" placeholder="Star Wars&#10;Lord of the Rings&#10;Marvel"></textarea>
                            <p class="text-xs text-gray-500 mt-1">Titles containing these keywords will be protected from removal</p>
                        </div>
                    </div>
                </div>

                <!-- Tautulli Settings -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-4">Tautulli Settings</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="label">Tautulli URL</label>
                            <input type="text" x-model="config.tautulli.url" class="input-field" placeholder="http://localhost:8181">
                        </div>
                        <div>
                            <label class="label">Tautulli API Key</label>
                            <input type="password" x-model="config.tautulli.api_key" class="input-field">
                        </div>
                    </div>
                    <div class="flex items-center space-x-3 mt-3">
                        <button type="button" @click="testConnection('tautulli')" class="btn-secondary text-sm py-1.5 px-3">Test Connection</button>
                        <span x-show="connectionStatus.tautulli !== null"
                              :class="connectionStatus.tautulli?.success ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'"
                              class="text-sm font-medium" x-text="connectionStatus.tautulli?.message"></span>
                    </div>
                </div>

                <!-- Sonarr Settings -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-4">Sonarr Settings</h3>
                    <div class="space-y-4">
                        <label class="flex items-center">
                            <input type="checkbox" x-model="config.sonarr.enabled" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Enable Sonarr Integration</span>
                        </label>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4" x-show="config.sonarr.enabled">
                            <div>
                                <label class="label">Sonarr URL</label>
                                <input type="text" x-model="config.sonarr.url" class="input-field" placeholder="http://localhost:8989">
                            </div>
                            <div>
                                <label class="label">Sonarr API Key</label>
                                <input type="password" x-model="config.sonarr.api_key" class="input-field">
                            </div>
                            <div>
                                <label class="flex items-center">
                                    <input type="checkbox" x-model="config.sonarr.delete_files" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Delete files from disk</span>
                                </label>
                            </div>
                            <div class="flex items-center space-x-3">
                                <button type="button" @click="testConnection('sonarr')" class="btn-secondary text-sm py-1.5 px-3">Test Connection</button>
                                <span x-show="connectionStatus.sonarr !== null"
                                      :class="connectionStatus.sonarr?.success ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'"
                                      class="text-sm font-medium" x-text="connectionStatus.sonarr?.message"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Radarr Settings -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-4">Radarr Settings</h3>
                    <div class="space-y-4">
                        <label class="flex items-center">
                            <input type="checkbox" x-model="config.radarr.enabled" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Enable Radarr Integration</span>
                        </label>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4" x-show="config.radarr.enabled">
                            <div>
                                <label class="label">Radarr URL</label>
                                <input type="text" x-model="config.radarr.url" class="input-field" placeholder="http://localhost:7878">
                            </div>
                            <div>
                                <label class="label">Radarr API Key</label>
                                <input type="password" x-model="config.radarr.api_key" class="input-field">
                            </div>
                            <div>
                                <label class="flex items-center">
                                    <input type="checkbox" x-model="config.radarr.delete_files" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Delete files from disk</span>
                                </label>
                            </div>
                            <div class="flex items-center space-x-3">
                                <button type="button" @click="testConnection('radarr')" class="btn-secondary text-sm py-1.5 px-3">Test Connection</button>
                                <span x-show="connectionStatus.radarr !== null"
                                      :class="connectionStatus.radarr?.success ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'"
                                      class="text-sm font-medium" x-text="connectionStatus.radarr?.message"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Safety Settings -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-4">Safety Settings</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="label">Max Items Per Run</label>
                            <input type="number" x-model.number="config.safety.max_items_per_run" class="input-field">
                        </div>
                        <label class="flex items-center">
                            <input type="checkbox" x-model="config.safety.dry_run" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Dry Run Mode (don't actually remove items)</span>
                        </label>
                    </div>
                </div>

                <!-- Save Button -->
                <div class="flex justify-end space-x-4">
                    <button type="button" @click="loadConfig" class="btn-secondary">Reset</button>
                    <button type="submit" :disabled="loading" class="btn-primary">
                        Save Configuration
                    </button>
                </div>
            </form>
        </template>
    </div>
</div>
