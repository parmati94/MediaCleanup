<div class="space-y-6">

    <!-- Empty state -->
    <template x-if="!analysis">
        <div class="card text-center py-16">
            <div class="mx-auto w-12 h-12 rounded-xl bg-primary-600/10 text-primary-600 dark:text-primary-400 flex items-center justify-center mb-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path>
                </svg>
            </div>
            <p class="text-gray-600 dark:text-gray-400 mb-4">Run an analysis to see how much space you can reclaim.</p>
            <button @click="runAnalysis(false)" :disabled="loading" class="btn-primary">Run Analysis</button>
        </div>
    </template>

    <template x-if="analysis">
        <div class="space-y-6">

            <!-- HERO: Library capacity / reclaim meter -->
            <div class="card">
                <div class="flex flex-wrap items-start justify-between gap-4">
                    <div>
                        <div class="eyebrow">Reclaimable space</div>
                        <div class="num text-5xl font-bold text-primary-600 dark:text-primary-400 mt-1 leading-none"
                             x-text="formatFileSize(analysis.current_config_impact?.potential_savings || 0)"></div>
                        <div class="text-sm text-gray-500 dark:text-gray-400 mt-2">
                            <span class="num font-medium text-gray-700 dark:text-gray-300" x-text="analysis.current_config_impact?.would_remove || 0"></span> titles ·
                            <span class="num" x-text="reclaimPct().toFixed(1)"></span>% of your
                            <span class="num" x-text="formatFileSize(analysis.current_config_impact?.total_library_size || 0)"></span> library
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-3">
                        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold"
                              :class="config?.safety?.dry_run ? 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300' : 'bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-300'">
                            <span class="w-1.5 h-1.5 rounded-full" :class="config?.safety?.dry_run ? 'bg-amber-500' : 'bg-rose-500'"></span>
                            <span x-text="config?.safety?.dry_run ? 'Dry run' : 'LIVE'"></span>
                        </span>
                        <div class="flex items-center gap-2">
                            <span x-show="analysisAt" x-cloak class="text-xs text-gray-400 dark:text-gray-500 mr-1" x-text="'Updated ' + timeAgo(analysisAt)"></span>
                            <button @click="runAnalysis(false)" :disabled="loading" class="btn-secondary text-sm py-1.5 px-3">Run analysis</button>
                            <button @click="currentTab = 'removal'" class="btn-primary text-sm py-1.5 px-4">Review candidates &rarr;</button>
                        </div>
                    </div>
                </div>

                <!-- Capacity meter -->
                <div class="mt-6">
                    <div class="h-3 w-full rounded-full bg-gray-200 dark:bg-gray-800 overflow-hidden">
                        <div class="h-full rounded-full bg-primary-500 transition-all duration-700 ease-out"
                             :style="`width:${reclaimPct()}%`"></div>
                    </div>
                    <div class="mt-2 flex items-center justify-between text-xs text-gray-500 dark:text-gray-400">
                        <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-primary-500"></span> Reclaimable</span>
                        <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-700"></span> In use</span>
                    </div>
                </div>
            </div>

            <!-- Three focused tiles -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="stat-tile">
                    <div class="eyebrow">Candidates</div>
                    <div class="num text-3xl font-bold text-gray-900 dark:text-white mt-1"
                         x-text="analysis.current_config_impact?.would_remove || 0"></div>
                    <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                        <span class="num" x-text="analysis.current_config_impact?.movies_to_remove || 0"></span> movies ·
                        <span class="num" x-text="analysis.current_config_impact?.shows_to_remove || 0"></span> shows
                    </div>
                </div>

                <div class="stat-tile">
                    <div class="eyebrow">Reclaimable</div>
                    <div class="num text-3xl font-bold text-primary-600 dark:text-primary-400 mt-1"
                         x-text="formatFileSize(analysis.current_config_impact?.potential_savings || 0)"></div>
                    <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                        of <span class="num" x-text="formatFileSize(analysis.current_config_impact?.total_library_size || 0)"></span>
                    </div>
                </div>

                <div class="stat-tile">
                    <div class="eyebrow">Biggest single win</div>
                    <template x-if="analysis.current_config_impact?.largest_candidate">
                        <div>
                            <div class="num text-3xl font-bold text-gray-900 dark:text-white mt-1"
                                 x-text="formatFileSize(analysis.current_config_impact.largest_candidate.file_size)"></div>
                            <div class="text-xs text-gray-500 dark:text-gray-400 mt-1 truncate"
                                 x-text="analysis.current_config_impact.largest_candidate.title"></div>
                        </div>
                    </template>
                    <template x-if="!analysis.current_config_impact?.largest_candidate">
                        <div class="num text-3xl font-bold text-gray-400 mt-1">&mdash;</div>
                    </template>
                </div>
            </div>

            <!-- Slim strip: watch mix + services -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

                <!-- Watch mix (TV) -->
                <div class="stat-tile" x-show="analysis.watch_status?.shows">
                    <div class="eyebrow mb-3">Watch mix &middot; TV</div>
                    <div class="flex h-3 w-full rounded-full overflow-hidden bg-gray-200 dark:bg-gray-800">
                        <div class="h-full bg-primary-500" :style="`width:${watchPct('shows','never_watched')}%`"></div>
                        <div class="h-full bg-gray-400 dark:bg-gray-500" :style="`width:${watchPct('shows','lightly_watched')}%`"></div>
                        <div class="h-full bg-gray-500 dark:bg-gray-600" :style="`width:${watchPct('shows','moderately_watched')}%`"></div>
                        <div class="h-full bg-gray-600 dark:bg-gray-700" :style="`width:${watchPct('shows','heavily_watched')}%`"></div>
                    </div>
                    <div class="mt-3 grid grid-cols-2 gap-x-4 gap-y-1.5 text-xs text-gray-600 dark:text-gray-400">
                        <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-primary-500"></span> Never <span class="num ml-auto text-gray-500" x-text="analysis.watch_status?.shows?.never_watched || 0"></span></span>
                        <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-gray-400 dark:bg-gray-500"></span> Lightly <span class="num ml-auto text-gray-500" x-text="analysis.watch_status?.shows?.lightly_watched || 0"></span></span>
                        <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-gray-500 dark:bg-gray-600"></span> Moderately <span class="num ml-auto text-gray-500" x-text="analysis.watch_status?.shows?.moderately_watched || 0"></span></span>
                        <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-gray-600 dark:bg-gray-700"></span> Heavily <span class="num ml-auto text-gray-500" x-text="analysis.watch_status?.shows?.heavily_watched || 0"></span></span>
                    </div>
                </div>

                <!-- Services -->
                <div class="stat-tile">
                    <div class="flex items-center justify-between mb-3">
                        <div class="eyebrow">Services</div>
                        <button @click="testAllConnections()" :disabled="loading" class="text-xs font-medium text-primary-600 dark:text-primary-400 hover:underline">Test</button>
                    </div>
                    <div class="space-y-2.5">
                        <template x-for="svc in ['tautulli','sonarr','radarr']" :key="svc">
                            <div class="flex items-center gap-2.5">
                                <span class="w-2.5 h-2.5 rounded-full flex-shrink-0"
                                      :class="connectionStatus[svc] === null ? 'bg-gray-300 dark:bg-gray-600' : (connectionStatus[svc]?.success ? 'bg-emerald-500' : 'bg-rose-500')"></span>
                                <span class="font-medium text-gray-800 dark:text-gray-200 capitalize" x-text="svc"></span>
                                <span class="text-xs text-gray-500 dark:text-gray-400 truncate ml-auto" x-text="connectionStatus[svc]?.message || 'Not tested'"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>
