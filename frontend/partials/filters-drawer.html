<!-- Removal Filters — right-side slide-over drawer -->
<div x-show="filtersOpen" x-cloak class="fixed inset-0 z-50 overflow-hidden"
     x-transition:leave="duration-500"
     @keydown.escape.window="filtersOpen = false">
    <div x-show="filtersOpen"
         class="absolute inset-0 bg-black/50"
         @click="filtersOpen = false"
         x-transition:enter="transition-opacity ease-out duration-500"
         x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-in duration-400"
         x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"></div>
    <div class="absolute inset-y-0 right-0 flex max-w-full">
        <div x-show="filtersOpen"
             class="w-screen max-w-md bg-white dark:bg-gray-800 shadow-2xl flex flex-col h-full drawer-panel"
             x-transition:enter="transform transition duration-500 drawer-ease-out"
             x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
             x-transition:leave="transform transition duration-400 drawer-ease-in"
             x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full">

            <!-- Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700">
                <div class="flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L14 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 018 21v-7.586L3.293 6.707A1 1 0 013 6V4z"></path>
                    </svg>
                    <h2 class="text-xl font-bold text-gray-900 dark:text-white">Removal Filters</h2>
                </div>
                <button @click="filtersOpen = false" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition" aria-label="Close">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <template x-if="config">
                <div class="flex-1 overflow-y-auto px-6 py-5 space-y-5" @input.debounce.450ms="refreshPreview()">

                    <!-- Live impact preview -->
                    <div class="rounded-lg border border-primary-200 dark:border-primary-900/40 bg-primary-50/60 dark:bg-primary-900/10 p-4">
                        <div class="flex items-start justify-between gap-4">
                            <div>
                                <div class="eyebrow text-primary-700 dark:text-primary-300">Would flag for removal</div>
                                <div class="mt-1 flex items-baseline gap-2">
                                    <span class="text-2xl font-bold num text-gray-900 dark:text-white" x-text="previewData ? previewData.count : '—'"></span>
                                    <span class="text-sm text-gray-500">items</span>
                                    <span x-show="previewLoading" class="text-xs text-primary-500 animate-pulse">updating…</span>
                                </div>
                                <div class="text-xs text-gray-500 mt-0.5" x-show="previewData">
                                    <span class="num" x-text="previewData?.movies || 0"></span> movies &middot;
                                    <span class="num" x-text="previewData?.shows || 0"></span> shows
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="eyebrow text-primary-700 dark:text-primary-300">Reclaimable</div>
                                <div class="mt-1 text-2xl font-bold num text-gray-900 dark:text-white" x-text="previewData ? formatFileSize(previewData.reclaimable) : '—'"></div>
                                <div class="text-xs text-gray-500 mt-0.5" x-show="previewData?.library_size" x-text="'of ' + formatFileSize(previewData?.library_size) + ' library'"></div>
                            </div>
                        </div>
                    </div>

                    <p class="text-sm text-gray-500 dark:text-gray-400">These filters decide what counts as a removal candidate everywhere &mdash; the dashboard and the removal list.</p>

                    <!-- Media type -->
                    <div>
                        <label class="label">Media Type</label>
                        <div class="inline-flex rounded-lg border border-gray-300 dark:border-gray-600 overflow-hidden">
                            <template x-for="opt in [{k:'both',l:'Both'},{k:'movies',l:'Movies'},{k:'tv',l:'TV'}]" :key="opt.k">
                                <button type="button" @click="setMediaType(opt.k)"
                                        :class="mediaType === opt.k ? 'bg-primary-600 text-white' : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700'"
                                        class="px-4 py-2 text-sm font-medium transition border-r last:border-r-0 border-gray-300 dark:border-gray-600"
                                        x-text="opt.l"></button>
                            </template>
                        </div>
                    </div>

                    <!-- Primary criteria -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="label">Days Unwatched</label>
                            <input type="number" x-model.number="config.media.days_unwatched" class="input-field">
                            <p class="text-xs text-gray-500 mt-1">Days since last watched.</p>
                        </div>
                        <div>
                            <label class="label">Min Days Since Added</label>
                            <input type="number" x-model.number="config.media.min_days_since_added" class="input-field">
                            <p class="text-xs text-gray-500 mt-1">Minimum age in the library.</p>
                        </div>
                    </div>
                    <p class="text-xs text-primary-700 dark:text-primary-300 bg-primary-50 dark:bg-primary-900/10 rounded px-2.5 py-1.5">
                        Never-watched titles need <span class="font-semibold num" x-text="neverWatchedFloor()"></span> days in the library before removal.
                    </p>

                    <!-- Play-count threshold -->
                    <div>
                        <label class="label">Only Remove If Watched Fewer Than</label>
                        <div class="flex items-center gap-2">
                            <input type="number" min="0" x-model.number="config.media.max_play_count" class="input-field w-24 text-center num">
                            <span class="text-sm text-gray-600 dark:text-gray-300">times</span>
                        </div>
                        <p class="text-xs text-gray-500 mt-1">
                            <span x-show="!config.media.max_play_count || config.media.max_play_count < 1">0 = ignore play count (only the day thresholds apply).</span>
                            <span x-show="config.media.max_play_count === 1">Only ever remove items that were never watched.</span>
                            <span x-show="config.media.max_play_count > 1">Keeps anything watched <span class="num" x-text="config.media.max_play_count"></span>+ times.</span>
                        </p>
                    </div>

                    <!-- Advanced protections -->
                    <div x-data="{ advOpen: false }" class="border-t border-gray-200 dark:border-gray-700 pt-3">
                        <button type="button" @click="advOpen = !advOpen" class="flex items-center gap-2 text-sm font-medium text-primary-600 dark:text-primary-400">
                            <svg class="w-4 h-4 transition-transform duration-200" :class="advOpen ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                            </svg>
                            Advanced protections
                        </button>
                        <div x-show="advOpen" x-transition class="mt-4 space-y-4">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="label">Min Rating to Keep (0-10)</label>
                                    <input type="number" step="0.1" min="0" max="10" x-model.number="config.media.filters.min_rating_to_keep" class="input-field">
                                    <p class="text-xs text-gray-500 mt-1">Keep items rated above this (0 = off).</p>
                                </div>
                                <div>
                                    <label class="label">Min Audience Rating to Keep (0-10)</label>
                                    <input type="number" step="0.1" min="0" max="10" x-model.number="config.media.filters.min_audience_rating_to_keep" class="input-field">
                                    <p class="text-xs text-gray-500 mt-1">0 = off.</p>
                                </div>
                                <div>
                                    <label class="label">Protect Classics Before Year</label>
                                    <input type="number" x-model.number="config.media.filters.protect_classics_before_year" class="input-field">
                                    <p class="text-xs text-gray-500 mt-1">Keep movies this year or older (0 = off).</p>
                                </div>
                                <div>
                                    <label class="label">Protect Recent After Year</label>
                                    <input type="number" x-model.number="config.media.filters.protect_recent_after_year" class="input-field">
                                    <p class="text-xs text-gray-500 mt-1">Keep movies newer than this (0 = off).</p>
                                </div>
                                <div>
                                    <label class="label">Min File Size to Keep (GB)</label>
                                    <input type="number" step="0.1" min="0" x-model.number="minSizeGB" class="input-field">
                                    <p class="text-xs text-gray-500 mt-1">Keep files larger than this (0 = off).</p>
                                </div>
                            </div>

                            <!-- Protected keywords (pill input) -->
                            <div x-data="{ draft: '' }">
                                <label class="label">Protected Keywords</label>
                                <div class="flex flex-wrap gap-1.5 mb-2" x-show="config.media.filters.protected_keywords.length">
                                    <template x-for="(kw, idx) in config.media.filters.protected_keywords" :key="kw + ':' + idx">
                                        <span class="pill">
                                            <span x-text="kw"></span>
                                            <button type="button" class="pill-x" aria-label="Remove" @click="removePill('protected_keywords', idx)">&times;</button>
                                        </span>
                                    </template>
                                </div>
                                <div class="flex gap-2">
                                    <input type="text" x-model="draft"
                                           @keydown.enter.prevent="if (addPill('protected_keywords', draft)) draft = ''"
                                           class="input-field flex-1" placeholder="Add a title keyword…">
                                    <button type="button" class="btn-secondary px-3" @click="if (addPill('protected_keywords', draft)) draft = ''">Add</button>
                                </div>
                                <p class="text-xs text-gray-500 mt-1">Titles containing any of these are never removed.</p>
                            </div>

                            <!-- Protected genres (pill input with library suggestions) -->
                            <div x-data="{ draft: '' }">
                                <label class="label">Protected Genres</label>
                                <div class="flex flex-wrap gap-1.5 mb-2" x-show="config.media.filters.protected_genres.length">
                                    <template x-for="(g, idx) in config.media.filters.protected_genres" :key="g + ':' + idx">
                                        <span class="pill">
                                            <span x-text="g"></span>
                                            <button type="button" class="pill-x" aria-label="Remove" @click="removePill('protected_genres', idx)">&times;</button>
                                        </span>
                                    </template>
                                </div>
                                <div class="flex gap-2">
                                    <input type="text" x-model="draft"
                                           @keydown.enter.prevent="if (addPill('protected_genres', draft)) draft = ''"
                                           class="input-field flex-1" placeholder="Add a genre…">
                                    <button type="button" class="btn-secondary px-3" @click="if (addPill('protected_genres', draft)) draft = ''">Add</button>
                                </div>
                                <div class="mt-2" x-show="genreSuggestions().length">
                                    <div class="eyebrow mb-1.5" style="font-size:10px">From your library &mdash; tap to add</div>
                                    <div class="flex flex-wrap gap-1.5 max-h-28 overflow-y-auto pr-1">
                                        <template x-for="g in genreSuggestions()" :key="g">
                                            <button type="button" class="pill-suggest" @click="addPill('protected_genres', g)">
                                                <span class="text-primary-500 font-semibold">+</span> <span x-text="g"></span>
                                            </button>
                                        </template>
                                    </div>
                                </div>
                                <p class="text-xs text-gray-500 mt-1">Items in any of these genres are never removed.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Footer -->
            <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-200 dark:border-gray-700">
                <button @click="filtersOpen = false" class="btn-secondary">Cancel</button>
                <button @click="saveFilters()" :disabled="loading" class="btn-primary">Save filters</button>
            </div>
        </div>
    </div>
</div>
