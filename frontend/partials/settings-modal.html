<!-- Settings Modal -->
<div x-show="settingsOpen" x-cloak
     class="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto p-4 sm:p-8"
     x-transition.opacity
     @keydown.escape.window="settingsOpen = false">
    <div class="fixed inset-0 bg-black/50"></div>
    <div class="relative w-full max-w-2xl bg-white dark:bg-gray-800 rounded-xl shadow-2xl my-4">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4">
            <div class="flex items-center space-x-2">
                <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <h2 class="text-xl font-bold text-gray-900 dark:text-white">Settings</h2>
            </div>
            <button @click="settingsOpen = false" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Tabs -->
        <div class="flex gap-6 px-6 border-b border-gray-200 dark:border-gray-700">
            <button @click="settingsTab = 'connections'"
                    :class="settingsTab === 'connections' ? 'border-primary-500 text-primary-600 dark:text-primary-400' : 'border-transparent text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'"
                    class="py-3 -mb-px border-b-2 text-sm font-semibold transition">Connections</button>
            <button @click="settingsTab = 'filters'"
                    :class="settingsTab === 'filters' ? 'border-primary-500 text-primary-600 dark:text-primary-400' : 'border-transparent text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'"
                    class="py-3 -mb-px border-b-2 text-sm font-semibold transition">Removal Filters</button>
        </div>

        <template x-if="config">
            <div class="px-6 py-5 max-h-[65vh] overflow-y-auto">

                <!-- ===== Connections tab ===== -->
                <div x-show="settingsTab === 'connections'" class="space-y-6">
                    <div class="flex items-center justify-between">
                        <h3 class="eyebrow">Connections</h3>
                        <button type="button" @click="testAllConnections()" class="text-sm font-medium text-primary-600 dark:text-primary-400 hover:underline">Test all</button>
                    </div>

                    <!-- Tautulli -->
                    <div class="rounded-lg border border-gray-200 dark:border-gray-700 p-4 space-y-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="w-2.5 h-2.5 rounded-full"
                                      :class="connectionStatus.tautulli === null ? 'bg-gray-300 dark:bg-gray-600' : (connectionStatus.tautulli?.success ? 'bg-emerald-500' : 'bg-rose-500')"></span>
                                <span class="font-semibold text-gray-800 dark:text-gray-200">Tautulli</span>
                            </div>
                            <button type="button" @click="testConnection('tautulli')" class="btn-secondary text-xs py-1 px-2.5">Test</button>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div>
                                <label class="label">URL</label>
                                <input type="text" x-model="config.tautulli.url" class="input-field" placeholder="http://localhost:8181">
                            </div>
                            <div>
                                <label class="label">API Key</label>
                                <input type="password" x-model="config.tautulli.api_key" class="input-field">
                            </div>
                        </div>
                        <p x-show="connectionStatus.tautulli !== null"
                           :class="connectionStatus.tautulli?.success ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'"
                           class="text-sm font-medium" x-text="connectionStatus.tautulli?.message"></p>
                    </div>

                    <!-- Sonarr -->
                    <div class="rounded-lg border border-gray-200 dark:border-gray-700 p-4 space-y-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="w-2.5 h-2.5 rounded-full"
                                      :class="!config.sonarr.enabled ? 'bg-gray-300 dark:bg-gray-600' : (connectionStatus.sonarr === null ? 'bg-gray-400' : (connectionStatus.sonarr?.success ? 'bg-emerald-500' : 'bg-rose-500'))"></span>
                                <span class="font-semibold text-gray-800 dark:text-gray-200">Sonarr</span>
                            </div>
                            <button type="button" @click="config.sonarr.enabled = !config.sonarr.enabled" role="switch" :aria-checked="config.sonarr.enabled"
                                    class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2"
                                    :class="config.sonarr.enabled ? 'bg-primary-600' : 'bg-gray-300 dark:bg-gray-600'">
                                <span class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow transition duration-200"
                                      :class="config.sonarr.enabled ? 'translate-x-5' : 'translate-x-0'"></span>
                            </button>
                        </div>
                        <div x-show="config.sonarr.enabled" x-transition class="space-y-3">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                <div>
                                    <label class="label">URL</label>
                                    <input type="text" x-model="config.sonarr.url" class="input-field" placeholder="http://localhost:8989">
                                </div>
                                <div>
                                    <label class="label">API Key</label>
                                    <input type="password" x-model="config.sonarr.api_key" class="input-field">
                                </div>
                            </div>
                            <div class="flex items-center justify-between flex-wrap gap-2">
                                <label class="flex items-center">
                                    <input type="checkbox" x-model="config.sonarr.delete_files" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Delete files from disk</span>
                                </label>
                                <div class="flex items-center gap-2">
                                    <span x-show="connectionStatus.sonarr !== null"
                                          :class="connectionStatus.sonarr?.success ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'"
                                          class="text-sm font-medium" x-text="connectionStatus.sonarr?.message"></span>
                                    <button type="button" @click="testConnection('sonarr')" class="btn-secondary text-xs py-1 px-2.5">Test</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Radarr -->
                    <div class="rounded-lg border border-gray-200 dark:border-gray-700 p-4 space-y-3">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="w-2.5 h-2.5 rounded-full"
                                      :class="!config.radarr.enabled ? 'bg-gray-300 dark:bg-gray-600' : (connectionStatus.radarr === null ? 'bg-gray-400' : (connectionStatus.radarr?.success ? 'bg-emerald-500' : 'bg-rose-500'))"></span>
                                <span class="font-semibold text-gray-800 dark:text-gray-200">Radarr</span>
                            </div>
                            <button type="button" @click="config.radarr.enabled = !config.radarr.enabled" role="switch" :aria-checked="config.radarr.enabled"
                                    class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2"
                                    :class="config.radarr.enabled ? 'bg-primary-600' : 'bg-gray-300 dark:bg-gray-600'">
                                <span class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow transition duration-200"
                                      :class="config.radarr.enabled ? 'translate-x-5' : 'translate-x-0'"></span>
                            </button>
                        </div>
                        <div x-show="config.radarr.enabled" x-transition class="space-y-3">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                <div>
                                    <label class="label">URL</label>
                                    <input type="text" x-model="config.radarr.url" class="input-field" placeholder="http://localhost:7878">
                                </div>
                                <div>
                                    <label class="label">API Key</label>
                                    <input type="password" x-model="config.radarr.api_key" class="input-field">
                                </div>
                            </div>
                            <div class="flex items-center justify-between flex-wrap gap-2">
                                <label class="flex items-center">
                                    <input type="checkbox" x-model="config.radarr.delete_files" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Delete files from disk</span>
                                </label>
                                <div class="flex items-center gap-2">
                                    <span x-show="connectionStatus.radarr !== null"
                                          :class="connectionStatus.radarr?.success ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400'"
                                          class="text-sm font-medium" x-text="connectionStatus.radarr?.message"></span>
                                    <button type="button" @click="testConnection('radarr')" class="btn-secondary text-xs py-1 px-2.5">Test</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Safety -->
                    <h3 class="eyebrow pt-2">Safety</h3>
                    <div class="rounded-lg border border-gray-200 dark:border-gray-700 p-4">
                        <div class="flex items-center justify-between gap-4">
                            <div>
                                <div class="font-semibold text-gray-800 dark:text-gray-200">Max Items Per Run</div>
                                <p class="text-xs text-gray-500 mt-0.5">Hard cap on how many items a single removal can delete.</p>
                            </div>
                            <input type="number" x-model.number="config.safety.max_items_per_run" class="input-field w-24 text-center num">
                        </div>
                    </div>
                </div>

                <!-- ===== Removal Filters tab ===== -->
                <div x-show="settingsTab === 'filters'" class="space-y-5">
                    <p class="text-sm text-gray-500 dark:text-gray-400">These filters decide what counts as a removal candidate everywhere &mdash; the dashboard and the removal list.</p>

                    <!-- Media type -->
                    <div>
                        <label class="label">Media Type</label>
                        <div class="inline-flex rounded-lg border border-gray-300 dark:border-gray-600 overflow-hidden">
                            <template x-for="opt in [{k:'both',l:'Both'},{k:'movies',l:'Movies'},{k:'tv',l:'TV'}]" :key="opt.k">
                                <button type="button" @click="setMediaType(opt.k)"
                                        :class="mediaType === opt.k ? 'bg-primary-600 text-white' : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700'"
                                        class="px-4 py-2 text-sm font-medium transition border-r last:border-r-0 border-gray-300 dark:border-gray-600"
                                        x-text="opt.l"></button>
                            </template>
                        </div>
                    </div>

                    <!-- Primary criteria -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="label">Days Unwatched</label>
                            <input type="number" x-model.number="config.media.days_unwatched" class="input-field">
                            <p class="text-xs text-gray-500 mt-1">Days since last watched.</p>
                        </div>
                        <div>
                            <label class="label">Min Days Since Added</label>
                            <input type="number" x-model.number="config.media.min_days_since_added" class="input-field">
                            <p class="text-xs text-gray-500 mt-1">Minimum age in the library.</p>
                        </div>
                    </div>
                    <label class="flex items-center">
                        <input type="checkbox" x-model="config.media.require_zero_play_count" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                        <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Only ever remove items that have never been watched</span>
                    </label>

                    <!-- Advanced protections -->
                    <div x-data="{ advOpen: false }" class="border-t border-gray-200 dark:border-gray-700 pt-3">
                        <button type="button" @click="advOpen = !advOpen" class="flex items-center gap-2 text-sm font-medium text-primary-600 dark:text-primary-400">
                            <svg class="w-4 h-4 transition-transform duration-200" :class="advOpen ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                            </svg>
                            Advanced protections
                        </button>
                        <div x-show="advOpen" x-transition class="mt-4 space-y-4">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="label">Min Rating to Keep (0-10)</label>
                                    <input type="number" step="0.1" min="0" max="10" x-model.number="config.media.filters.min_rating_to_keep" class="input-field">
                                    <p class="text-xs text-gray-500 mt-1">Keep items rated above this (0 = off).</p>
                                </div>
                                <div>
                                    <label class="label">Min Audience Rating to Keep (0-10)</label>
                                    <input type="number" step="0.1" min="0" max="10" x-model.number="config.media.filters.min_audience_rating_to_keep" class="input-field">
                                    <p class="text-xs text-gray-500 mt-1">0 = off.</p>
                                </div>
                                <div>
                                    <label class="label">Protect Classics Before Year</label>
                                    <input type="number" x-model.number="config.media.filters.protect_classics_before_year" class="input-field">
                                    <p class="text-xs text-gray-500 mt-1">Keep movies this year or older (0 = off).</p>
                                </div>
                                <div>
                                    <label class="label">Protect Recent After Year</label>
                                    <input type="number" x-model.number="config.media.filters.protect_recent_after_year" class="input-field">
                                    <p class="text-xs text-gray-500 mt-1">Keep movies newer than this (0 = off).</p>
                                </div>
                                <div>
                                    <label class="label">Min File Size to Keep (GB)</label>
                                    <input type="number" step="0.1" min="0" x-model.number="minSizeGB" class="input-field">
                                    <p class="text-xs text-gray-500 mt-1">Keep files larger than this (0 = off).</p>
                                </div>
                            </div>
                            <div>
                                <label class="label">Protected Keywords (one per line)</label>
                                <textarea x-model="protectedKeywordsText" @input="updateProtectedKeywords" rows="4" class="input-field font-mono text-sm" placeholder="Star Wars&#10;Lord of the Rings"></textarea>
                                <p class="text-xs text-gray-500 mt-1">Titles containing these are never removed.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Footer -->
        <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-200 dark:border-gray-700">
            <button @click="settingsOpen = false" class="btn-secondary">Cancel</button>
            <button @click="saveSettings()" :disabled="loading" class="btn-primary">Save</button>
        </div>
    </div>
</div>
