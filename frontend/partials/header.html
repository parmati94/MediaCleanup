<header class="bg-white dark:bg-gray-800 shadow-md">
    <div class="container mx-auto px-4 py-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Media Cleanup UI</h1>
                <p class="text-gray-600 dark:text-gray-400 mt-1">Manage unwatched media removal</p>
            </div>
            <div class="flex items-center space-x-4">
                <span x-show="loading" class="text-sm text-gray-600 dark:text-gray-400 flex items-center">
                    <svg class="animate-spin h-5 w-5 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Loading...
                </span>
                <div x-show="config && config.safety && config.safety.dry_run" class="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full text-sm font-medium">
                    Dry Run Mode
                </div>
            </div>
        </div>
    </div>
</header>
