<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Cleanup UI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script type="module" src="/js/app.js" defer></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900">
    <div x-data="appData()" x-init="init()" class="min-h-screen">
        <!-- Toast Notifications -->
        <div class="fixed top-4 right-4 z-50 space-y-2" style="max-width: 400px;">
            <template x-for="toast in toasts" :key="toast.id">
                <div x-show="true"
                     x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0 transform translate-x-full"
                     x-transition:enter-end="opacity-100 transform translate-x-0"
                     x-transition:leave="transition ease-in duration-200"
                     x-transition:leave-start="opacity-100"
                     x-transition:leave-end="opacity-0"
                     @click="removeToast(toast.id)"
                     class="px-6 py-4 rounded-lg shadow-lg cursor-pointer flex items-start space-x-3"
                     :class="{
                         'bg-green-500 text-white': toast.type === 'success',
                         'bg-red-500 text-white': toast.type === 'error',
                         'bg-yellow-500 text-white': toast.type === 'warning',
                         'bg-blue-500 text-white': toast.type === 'info'
                     }">
                    <!-- Success Icon -->
                    <svg x-show="toast.type === 'success'" class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <!-- Error Icon -->
                    <svg x-show="toast.type === 'error'" class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                    <!-- Warning Icon -->
                    <svg x-show="toast.type === 'warning'" class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                    <!-- Info Icon -->
                    <svg x-show="toast.type === 'info'" class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="flex-1 text-sm font-medium" x-text="toast.message"></p>
                    <button @click.stop="removeToast(toast.id)" class="flex-shrink-0 hover:opacity-75">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </template>
        </div>
        
        {{> header}}
        
        <main class="container mx-auto px-4 py-8">
            <!-- Tab Navigation -->
            <div class="mb-8">
                <nav class="flex space-x-4 border-b border-gray-200 dark:border-gray-700">
                    <button @click="currentTab = 'dashboard'" 
                            :class="currentTab === 'dashboard' ? 'border-primary-600 text-primary-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
                            class="px-4 py-2 border-b-2 font-medium text-sm transition">
                        Dashboard
                    </button>
                    <button @click="currentTab = 'analysis'" 
                            :class="currentTab === 'analysis' ? 'border-primary-600 text-primary-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
                            class="px-4 py-2 border-b-2 font-medium text-sm transition">
                        Analysis
                    </button>
                    <button @click="currentTab = 'config'" 
                            :class="currentTab === 'config' ? 'border-primary-600 text-primary-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
                            class="px-4 py-2 border-b-2 font-medium text-sm transition">
                        Configuration
                    </button>
                    <button @click="currentTab = 'removal'" 
                            :class="currentTab === 'removal' ? 'border-primary-600 text-primary-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
                            class="px-4 py-2 border-b-2 font-medium text-sm transition">
                        Removal
                    </button>
                </nav>
            </div>

            <!-- Dashboard Tab -->
            <div x-show="currentTab === 'dashboard'" x-cloak>
                {{> dashboard-tab}}
            </div>

            <!-- Analysis Tab -->
            <div x-show="currentTab === 'analysis'" x-cloak>
                {{> analysis-tab}}
            </div>

            <!-- Configuration Tab -->
            <div x-show="currentTab === 'config'" x-cloak>
                {{> config-tab}}
            </div>

            <!-- Removal Tab -->
            <div x-show="currentTab === 'removal'" x-cloak>
                {{> removal-tab}}
            </div>
        </main>

        {{> footer}}
    </div>

    <style>
        [x-cloak] { display: none !important; }
    </style>
</body>
</html>
